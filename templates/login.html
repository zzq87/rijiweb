{% extends "base.html" %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>登录</h1>
    <form method="POST" action="{{ url_for('auth.login') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required autofocus maxlength="50"
                   autocomplete="username">
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required maxlength="128"
                   autocomplete="current-password">
        </div>
        <div class="form-group form-check">
            <input type="checkbox" id="remember" name="remember">
            <label for="remember">记住我</label>
        </div>
        <button type="submit" class="btn btn-primary btn-full">登 录</button>
    </form>
    <p class="form-footer">还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a></p>
</div>
{% endblock %}
