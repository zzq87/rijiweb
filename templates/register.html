{% extends "base.html" %}
{% block title %}注册{% endblock %}
{% block content %}
<div class="auth-form">
    <h1>注册账号</h1>
    <form method="POST" action="{{ url_for('auth.register') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" name="username" required autofocus maxlength="50"
                   value="{{ username or '' }}" autocomplete="username">
            <small>2-50个字符，支持字母、数字、下划线和连字符</small>
        </div>
        <div class="form-group">
            <label for="password">密码</label>
            <input type="password" id="password" name="password" required maxlength="128"
                   autocomplete="new-password" minlength="6">
            <small>至少6个字符</small>
        </div>
        <div class="form-group">
            <label for="confirm">确认密码</label>
            <input type="password" id="confirm" name="confirm" required maxlength="128"
                   autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary btn-full">注 册</button>
    </form>
    <p class="form-footer">已有账号？<a href="{{ url_for('auth.login') }}">去登录</a></p>
</div>
{% endblock %}
